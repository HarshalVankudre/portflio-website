    <!-- auto-handled -->
    <rect x="134" y="218" width="592" height="64" fill="#101012" stroke="#ceff00" stroke-opacity="0.28"/>
    <rect x="134" y="218" width="2" height="64" fill="#ceff00"/>
    <text x="154" y="245" fill="#eae8e3" fill-opacity="0.9">#4127 &#8212; contract data update</text>
