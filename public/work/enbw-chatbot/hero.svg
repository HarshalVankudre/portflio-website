<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" font-family="ui-monospace,'Cascadia Mono','Courier New',monospace">
  <defs>
    <radialGradient id="gt" cx="88%" cy="12%" r="55%">
      <stop offset="0%" stop-color="#0b2b2b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0b2b2b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gv" cx="8%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#221440" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#221440" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ga" cx="34%" cy="36%" r="36%">
      <stop offset="0%" stop-color="#ceff00" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ceff00" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
