    <text x="706" y="401" text-anchor="end" fill="#98968f" font-size="10" letter-spacing="2">TEAM</text>

    <rect x="134" y="452" width="592" height="64" fill="#101012" stroke="#ceff00" stroke-opacity="0.28"/>
    <rect x="134" y="452" width="2" height="64" fill="#ceff00"/>
    <text x="154" y="479" fill="#eae8e3" fill-opacity="0.9">#4130 &#8212; portal access reset</text>
    <text x="154" y="502" font-size="10" fill="#56554f">CLASSIFIED &#183; TIER-1 &#183; CONFIDENCE HIGH</text>
    <text x="706" y="479" text-anchor="end" fill="#ceff00" font-size="10" letter-spacing="2">AUTO</text>

    <rect x="134" y="530" width="592" height="64" fill="#101012" stroke="#ceff00" stroke-opacity="0.28"/>
    <rect x="134" y="530" width="2" height="64" fill="#ceff00"/>
    <text x="154" y="557" fill="#eae8e3" fill-opacity="0.9">#4131 &#8212; invoice copy request</text>
    <text x="154" y="580" font-size="10" fill="#56554f">CLASSIFIED &#183; TIER-1 &#183; CONFIDENCE HIGH</text>
    <text x="706" y="557" text-anchor="end" fill="#ceff00" font-size="10" letter-spacing="2">AUTO</text>

