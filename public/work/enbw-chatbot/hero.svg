    <text x="810" y="760" fill="#56554f">RESPONSE TIME</text>
    <text x="810" y="796" font-size="26" fill="#ceff00">-35%</text>
    <text x="1090" y="760" fill="#56554f">TIER-1 AUTOMATED</text>
    <text x="1090" y="796" font-size="26" fill="#ceff00">~60%</text>
    <text x="1370" y="760" fill="#56554f">PILOT</text>
