    <text x="706" y="245" text-anchor="end" fill="#ceff00" font-size="10" letter-spacing="2">AUTO</text>

    <rect x="134" y="296" width="592" height="64" fill="#101012" stroke="#ceff00" stroke-opacity="0.28"/>
    <rect x="134" y="296" width="2" height="64" fill="#ceff00"/>
    <text x="154" y="323" fill="#eae8e3" fill-opacity="0.9">#4128 &#8212; feed-in report request</text>
    <text x="154" y="346" font-size="10" fill="#56554f">CLASSIFIED &#183; TIER-1 &#183; CONFIDENCE HIGH</text>
    <text x="706" y="323" text-anchor="end" fill="#ceff00" font-size="10" letter-spacing="2">AUTO</text>

