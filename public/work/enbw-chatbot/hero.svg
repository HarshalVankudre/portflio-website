  <text x="110" y="944" font-size="10" letter-spacing="2" fill="#56554f">CONCEPT PANEL &#8212; PRODUCTION UI IS INTERNAL</text>
  <text x="1490" y="944" text-anchor="end" font-size="10" letter-spacing="2" fill="#56554f">2024&#8211;2025 &#183; KARLSRUHE</text>
