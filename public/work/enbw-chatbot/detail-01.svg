  <text x="1040" y="498" text-anchor="middle" font-size="15" letter-spacing="2" fill="#eae8e3" fill-opacity="0.9">TEAM QUEUE</text>
  <text x="1040" y="528" text-anchor="middle" font-size="10" letter-spacing="1" fill="#56554f">AMBIGUOUS + COMPLEX</text>
  <text x="1040" y="550" text-anchor="middle" font-size="10" letter-spacing="1" fill="#56554f">HUMAN JUDGMENT</text>

  <text x="1385" y="238" text-anchor="middle" font-size="13" letter-spacing="2" fill="#eae8e3" fill-opacity="0.9">REPLY</text>
  <text x="1385" y="266" text-anchor="middle" font-size="10" letter-spacing="1" fill="#56554f">-35% RESPONSE TIME</text>
  <text x="1385" y="498" text-anchor="middle" font-size="13" letter-spacing="2" fill="#eae8e3" fill-opacity="0.9">RESOLVE</text>
  <text x="1385" y="526" text-anchor="middle" font-size="10" letter-spacing="1" fill="#56554f">WITH FULL CONTEXT</text>

  <!-- arrows -->
  <g stroke="#ceff00" stroke-opacity="0.7" fill="none">
    <path d="M410 375h80m0 0l-9 -6m9 6l-9 6"/>
    <path d="M800 355 L880 255m0 0l-11 2m11 -2l-2 11"/>
    <path d="M800 395 L880 495m0 0l-2 -11m2 11l-11 -2"/>
    <path d="M1190 245h80m0 0l-9 -6m9 6l-9 6"/>
    <path d="M1290 505h-90m90 0l-9 -6m9 6l-9 6" transform="translate(-10 0)"/>
