  <text x="836" y="290" font-size="9" letter-spacing="1" fill="#56554f" transform="rotate(-51 836 290)">CONFIDENT</text>
  <text x="826" y="452" font-size="9" letter-spacing="1" fill="#56554f" transform="rotate(51 826 452)">UNSURE</text>

  <!-- data sources strip -->
  <line x1="110" y1="700" x2="1490" y2="700" stroke="#eae8e3" stroke-opacity="0.08"/>
  <text x="110" y="740" font-size="10" letter-spacing="2" fill="#56554f">GROUNDING</text>
  <g font-size="12" fill="#98968f">
