  <text x="110" y="830" font-size="10" letter-spacing="1" fill="#56554f">MEASURED AGAINST THE TEAM'S REAL WORKLOAD &#8212; NOT A DEMO DATASET</text>

  <text x="110" y="944" font-size="10" letter-spacing="2" fill="#56554f">CONCEPT DIAGRAM &#8212; PRODUCTION SYSTEM IS INTERNAL</text>
  <text x="1490" y="944" text-anchor="end" font-size="10" letter-spacing="2" fill="#56554f">4-MONTH PROJECT + 3-MONTH PILOT</text>
