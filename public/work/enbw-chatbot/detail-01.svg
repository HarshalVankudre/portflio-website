    <rect x="500" y="300" width="300" height="150" fill="#0c0c0e" stroke="#eae8e3" stroke-opacity="0.14"/>
    <rect x="890" y="170" width="300" height="150" fill="#0c0c0e" stroke="#ceff00" stroke-opacity="0.35"/>
    <rect x="890" y="430" width="300" height="150" fill="#0c0c0e" stroke="#eae8e3" stroke-opacity="0.14"/>
    <rect x="1280" y="170" width="210" height="150" fill="#0c0c0e" stroke="#eae8e3" stroke-opacity="0.14"/>
    <rect x="1280" y="430" width="210" height="150" fill="#0c0c0e" stroke="#eae8e3" stroke-opacity="0.14"/>
  </g>

  <text x="128" y="330" font-size="10" letter-spacing="2" fill="#56554f">A</text>
  <text x="260" y="368" text-anchor="middle" font-size="15" letter-spacing="2" fill="#eae8e3" fill-opacity="0.9">INBOX</text>
