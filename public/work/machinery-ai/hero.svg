  <text x="1044" y="452" text-anchor="end" font-size="9" letter-spacing="1" fill="#ceff00">SOURCES ATTACHED</text>
  <line x1="418" y1="490" x2="1044" y2="490" stroke="#eae8e3" stroke-opacity="0.08"/>
  <text x="418" y="524" font-size="13" fill="#c8c6bf">Begin with the fluid level and a visible leak inspection.</text>
  <text x="418" y="551" font-size="13" fill="#c8c6bf">Then check filter restriction and compare pump pressure</text>
  <text x="418" y="578" font-size="13" fill="#c8c6bf">against the documented service range for the machine.</text>
  <rect x="418" y="612" width="294" height="52" fill="#08080a" stroke="#eae8e3" stroke-opacity="0.1"/>
  <text x="436" y="633" font-size="9" letter-spacing="1" fill="#686761">SOURCE 01</text>
  <text x="436" y="652" font-size="10" fill="#a7a59d">HYDRAULICS MANUAL / SERVICE</text>
  <rect x="726" y="612" width="318" height="52" fill="#08080a" stroke="#eae8e3" stroke-opacity="0.1"/>
  <text x="744" y="633" font-size="9" letter-spacing="1" fill="#686761">SOURCE 02</text>
  <text x="744" y="652" font-size="10" fill="#a7a59d">MAINTENANCE TABLE / PRESSURE</text>
  <text x="418" y="692" font-size="9" letter-spacing="1" fill="#686761">HYBRID SEARCH · RERANKED · CONTEXT COMPRESSED</text>

  <rect x="390" y="758" width="682" height="48" fill="#060607" stroke="#eae8e3" stroke-opacity="0.1"/>
  <text x="414" y="788" font-size="11" letter-spacing="1" fill="#686761">ASK ABOUT A MACHINE, MANUAL OR FAULT CODE</text>
  <text x="1046" y="788" text-anchor="end" font-size="9" letter-spacing="1" fill="#686761">RETURN</text>

