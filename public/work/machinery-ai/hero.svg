  <text x="538" y="356" font-size="14" fill="#eae8e3" fill-opacity="0.88">How should I diagnose a hydraulic pressure loss?</text>

  <rect x="390" y="410" width="682" height="302" fill="#111114" stroke="#ceff00" stroke-opacity="0.24" filter="url(#shadow)"/>
  <rect x="418" y="438" width="38" height="38" fill="#060607" stroke="#ceff00" stroke-opacity="0.72"/>
