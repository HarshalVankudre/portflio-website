<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" font-family="ui-monospace,'Cascadia Mono','Courier New',monospace">
  <defs>
    <radialGradient id="teal" cx="88%" cy="12%" r="62%">
      <stop offset="0%" stop-color="#0b3435" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#0b3435" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="8%" cy="92%" r="56%">
      <stop offset="0%" stop-color="#29194b" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#29194b" stop-opacity="0"/>
