  <line x1="390" y1="266" x2="1100" y2="266" stroke="#eae8e3" stroke-opacity="0.07"/>

  <rect x="510" y="302" width="562" height="74" fill="#151518" stroke="#eae8e3" stroke-opacity="0.1"/>
