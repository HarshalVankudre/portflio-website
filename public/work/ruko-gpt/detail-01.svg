    <text x="458" y="522">B</text>
    <text x="752" y="522">C</text>
    <text x="1046" y="522">D</text>
  </g>
  <g font-size="13" letter-spacing="2" text-anchor="middle" fill="#eae8e3" fill-opacity="0.85">
    <text x="270" y="546">INGEST</text>
    <text x="564" y="546">CHUNK + EMBED</text>
    <text x="858" y="546">RETRIEVE</text>
    <text x="1152" y="546" fill="#ceff00" fill-opacity="1">CITE</text>
  </g>
  <g font-size="9" letter-spacing="1" text-anchor="middle" fill="#56554f">
    <text x="270" y="570">PDF &#183; DOCX &#183; WIKI</text>
    <text x="564" y="570">PIPELINE RUNS ON UPLOAD</text>
    <text x="858" y="570">TOP-K OVER COMPANY DOCS</text>
    <text x="1152" y="570">SOURCES PINNED TO ANSWER</text>
  </g>
  <g stroke="#ceff00" stroke-opacity="0.8" stroke-width="1.5" fill="none">
    <use href="#arr" x="396" y="554"/>
    <use href="#arr" x="690" y="554"/>
    <use href="#arr" x="984" y="554"/>
  </g>

  <!-- data tier -->
  <rect x="120" y="720" width="640" height="160" fill="#0c0c0e" stroke="#eae8e3" stroke-opacity="0.14" filter="url(#sh)"/>
  <text x="152" y="760" font-size="12" letter-spacing="2" fill="#eae8e3" fill-opacity="0.85">DATA</text>
  <text x="728" y="760" text-anchor="end" font-size="10" letter-spacing="1" fill="#56554f">CONFIDENTIAL &#8212; STAYS INTERNAL</text>
  <line x1="120" y1="776" x2="760" y2="776" stroke="#eae8e3" stroke-opacity="0.08"/>
  <g font-size="12" fill="#98968f">
