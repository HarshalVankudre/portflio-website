  <rect x="900" y="720" width="580" height="160" fill="#0c0c0e" stroke="#eae8e3" stroke-opacity="0.14" filter="url(#sh)"/>
  <text x="932" y="760" font-size="12" letter-spacing="2" fill="#eae8e3" fill-opacity="0.85">REST API SERVER</text>
  <text x="1448" y="760" text-anchor="end" font-size="10" letter-spacing="1" fill="#56554f">SEPARATE SERVICE</text>
  <line x1="900" y1="776" x2="1480" y2="776" stroke="#eae8e3" stroke-opacity="0.08"/>
  <g font-size="12" fill="#98968f">
