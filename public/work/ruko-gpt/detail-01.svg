  <text x="1448" y="190" text-anchor="end" font-size="10" letter-spacing="1" fill="#56554f">OPENAI API</text>
  <line x1="900" y1="206" x2="1480" y2="206" stroke="#eae8e3" stroke-opacity="0.08"/>
  <g font-size="12" fill="#98968f">
