  <text x="1480" y="96" text-anchor="end" font-size="11" letter-spacing="2" fill="#56554f">R&#220;KO GPT &#8212; END TO END, BUILT SOLO</text>

  <!-- client tier -->
  <rect x="120" y="150" width="640" height="190" fill="#0c0c0e" stroke="#eae8e3" stroke-opacity="0.14" filter="url(#sh)"/>
  <text x="152" y="190" font-size="12" letter-spacing="2" fill="#eae8e3" fill-opacity="0.85">CLIENT</text>
  <text x="728" y="190" text-anchor="end" font-size="10" letter-spacing="1" fill="#56554f">50+ EMPLOYEES</text>
  <line x1="120" y1="206" x2="760" y2="206" stroke="#eae8e3" stroke-opacity="0.08"/>
  <g font-size="12" fill="#98968f">
    <text x="152" y="244">NEXT.JS &#183; TYPESCRIPT</text>
    <text x="152" y="272">CHAT UI &#183; SOURCE CITATIONS &#183; SESSIONS</text>
  </g>
  <rect x="152" y="294" width="120" height="24" fill="none" stroke="#ceff00" stroke-opacity="0.55"/>
  <text x="212" y="310" text-anchor="middle" font-size="10" letter-spacing="1" fill="#ceff00" fill-opacity="0.85">COMPANY SSO</text>
  <text x="296" y="310" font-size="10" letter-spacing="1" fill="#56554f">NEXTAUTH.JS &#8212; FIRMENKONTEN</text>

