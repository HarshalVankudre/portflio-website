  <!-- vertical flows -->
  <g stroke="#ceff00" stroke-opacity="0.8" stroke-width="1.5" fill="none">
    <use href="#arrv" x="440" y="348"/>
    <use href="#arrv" x="1190" y="348"/>
    <use href="#arrv" x="440" y="648"/>
    <use href="#arrv" x="1190" y="648"/>
  </g>
  <g font-size="9" letter-spacing="1" fill="#56554f">
    <text x="456" y="372">QUERY</text>
    <text x="1206" y="372">PROMPT + CONTEXT</text>
    <text x="456" y="672">SQL</text>
    <text x="1206" y="672">SYNC</text>
  </g>

  <!-- bottom measurement rule -->
  <line x1="120" y1="928" x2="1480" y2="928" stroke="#eae8e3" stroke-opacity="0.12" stroke-dasharray="1 7"/>
  <g stroke="#eae8e3" stroke-opacity="0.14">
    <line x1="120" y1="924" x2="120" y2="932"/>
    <line x1="460" y1="924" x2="460" y2="932"/>
    <line x1="800" y1="924" x2="800" y2="932"/>
    <line x1="1140" y1="924" x2="1140" y2="932"/>
    <line x1="1480" y1="924" x2="1480" y2="932"/>
  </g>
