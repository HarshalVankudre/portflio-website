  <text x="152" y="460" font-size="12" letter-spacing="2" fill="#eae8e3" fill-opacity="0.85">APPLICATION CORE</text>
  <text x="1448" y="460" text-anchor="end" font-size="10" letter-spacing="1" fill="#56554f">RETRIEVAL PIPELINE</text>
  <line x1="120" y1="476" x2="1480" y2="476" stroke="#eae8e3" stroke-opacity="0.1"/>
  <g fill="#060607" stroke="#eae8e3" stroke-opacity="0.12">
    <rect x="152" y="500" width="236" height="108"/>
    <rect x="446" y="500" width="236" height="108"/>
    <rect x="740" y="500" width="236" height="108"/>
    <rect x="1034" y="500" width="236" height="108"/>
  </g>
  <g font-size="9" fill="#56554f">
